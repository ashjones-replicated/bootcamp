apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "bootcamp.fullname" . }}
  labels:
    {{- include "bootcamp.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "secrets", "services", "endpoints", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "bootcamp.fullname" . }}
  labels:
    {{- include "bootcamp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "bootcamp.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "bootcamp.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Cluster-scoped read access required by the support bundle CLI for node
# readiness and storage class collection.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "bootcamp.fullname" . }}-cluster
  labels:
    {{- include "bootcamp.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "bootcamp.fullname" . }}-cluster
  labels:
    {{- include "bootcamp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "bootcamp.fullname" . }}-cluster
subjects:
  - kind: ServiceAccount
    name: {{ include "bootcamp.fullname" . }}
    namespace: {{ .Release.Namespace }}
